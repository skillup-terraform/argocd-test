name: CI/CD Pipeline

on:
  pull_request:        # Trigger for PR
    branches:
      - main
  push:                # Trigger for merge (push to main)
    branches:
      - main

env:
  APP_VERSION: 5.0.0

jobs:

  # 🔨 Build & Push on PR
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build image
        working-directory: ./application # Switch to app folder
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:$APP_VERSION .

      - name: Push image
        working-directory: ./application # Switch to app folder
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:$APP_VERSION


  # 🚀 Deploy on Merge to main
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Print message
        run: echo "Hello Suresh, CI/CD is working!"   # Step

      